name: Build & Release

on:
  push:
    tags:
      - 'v*'  # Build on version tags (v2.0.0, v2.1.0, etc.)
  workflow_dispatch:  # Manual trigger from GitHub UI

permissions:
  contents: write  # Required for creating releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: Linux
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-ARM
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS-Intel

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.name }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS: skip signing for CI builds (users can run unsigned)
          APPLE_SIGNING_IDENTITY: ''
          TAURI_SIGNING_PRIVATE_KEY: ''
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Audiobook Tagger ${{ github.ref_name }}'
          releaseBody: |
            ## Audiobook Tagger Desktop V2

            AI-powered audiobook metadata manager for AudiobookShelf.

            ### Features
            - Local AI via Ollama (Gemma 4, Qwen 3, and more) — no API key needed
            - Cloud AI (OpenAI GPT-5 Nano, Anthropic Claude)
            - Batch processing with progress bars
            - Connect to any AudiobookShelf server
            - Local folder scanning

            ### Installation
            - **Windows:** Download `.msi` installer
            - **macOS (Apple Silicon):** Download `.dmg`, right-click → Open (unsigned)
            - **macOS (Intel):** Download Intel `.dmg`
            - **Linux:** Download `.deb` or `.AppImage`

            > macOS users: Since the app is unsigned, you may need to go to System Settings → Privacy & Security → "Open Anyway" after first launch.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audiobook-tagger-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.nsis
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
          if-no-files-found: ignore
